<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir Hussein | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f8f8f8;
            --accent: #007AFF;
            --text: #111111;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin: 40px 0;
        }

        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 { font-size: 28px; margin: 20px 0 5px; letter-spacing: -1px; }
        .tagline { color: #666; font-size: 16px; margin-bottom: 30px; font-weight: 400; }

        /* Portfolio Gallery */
        .section-header {
            width: 100%;
            max-width: 450px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 15px;
            text-align: left;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 40px;
        }

        .project-card {
            background: var(--secondary-bg);
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eee;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        /* لێرە وێنەی نموونە کارەکانت لە بێهانسەوە دابنێ */
        .project-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #eee;
        }

        .project-info {
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-info span { font-weight: 700; font-size: 16px; }
        .project-info small { color: var(--accent); font-weight: 600; }

        /* Action Buttons */
        .contact-links {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 20px;
            border-radius: 18px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
        }
