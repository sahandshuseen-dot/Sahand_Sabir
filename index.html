<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir Hussein | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f8f8f8;
            --accent: #007AFF;
            --text: #111111;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin: 40px 0;
        }

        .profile img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { font-size: 26px; margin: 20px 0 5px; letter-spacing: -0.5px; }
        .tagline { color: #666; font-size: 16px; margin-bottom: 30px; }

        /* Portfolio Gallery */
        .section-header {
            width: 100%;
            max-width: 450px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #999;
            margin-bottom: 15px;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 40px;
        }

        .project-card {
            background: var(--secondary-bg);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: 0.3s ease;
            border: 1px solid #eee;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .project-info {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-info span { font-weight: 600; }

        /* Contact Section */
        .contact-links {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-behance { background: #0057ff; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }

        footer { margin-top: 60px; font-size: 13px; color: #ccc; }
    </style>
</head>
<body>

    <div class="profile">
        <img src="profile.jpg" alt="Sahand Sabir Hussein">
        <h1>Sahand Sabir Hussein</h1>
        <p class="tagline">Social Media Graphic Designer</p>
    </div>

    <div class="section-header">Featured Projects</div>
    
    <div class="gallery">
        <a href="https://www.behance.net/gallery/230238317/SUN-SET" class="project-card" target="_blank">
            <img src="sunset_preview.jpg" alt="Sun Set Project">
            <div class="project-info">
                <span>Sun Set Branding</span>
                <small>View Project ↗</small>
            </div>
        </a>

        <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" target="_blank">
            <img src="teammart_preview.jpg" alt="Teammart">
            <div class="project-info">
                <span>Teammart Market</span>
                <small>View Project ↗</small>
            </div>
        </a>

        <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" target="_blank">
            <img src="energy_preview.jpg" alt="Energy Drink">
            <div class="project-info">
                <span>Energy Drink Campaign</span>
                <small>View Project ↗</small>
            </div>
        </a>
    </div>

    <div class="section-header">Get In Touch</div>
    <div class="contact-links">
        <a href="https://www.behance.net/sahandshusen1" class="btn btn-behance">View Full Behance Portfolio</a>
        <a href="https://wa.me/9647500000000" class="btn btn-whatsapp">Contact via WhatsApp</a>
    </div>

    <footer>&copy; 2026 Sahand Sabir Hussein</footer>

</body>
</html>
