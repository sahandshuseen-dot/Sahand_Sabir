<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir | Visual Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #007AFF;
            --bg-start: #ffffff;
            --bg-end: #f0f7ff;
            --card-shadow: rgba(0, 0, 0, 0.08);
        }

        /* باگراوندی ڕووناک و جووڵاو */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ffffff, #f4f9ff, #eef2f3, #ffffff);
            background-size: 400% 400%;
            animation: meshGradient 12s ease infinite;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 50px 20px;
            box-sizing: border-box;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px var(--card-shadow);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile img:hover { transform: scale(1.1); box-shadow: 0 15px 35px rgba(0, 122, 255, 0.2); }

        h1 { font-size: 28px; font-weight: 900; margin: 15px 0 5px; letter-spacing: -1px; }
        .tagline { color: #666; font-size: 15px; }

        /* Project Cards - Real Ratio */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .img-container {
            width: 100%;
            background: #fdfdfd;
        }

        /* لێرەدا سایزی وێنەکە وەک خۆی دەمێنێتەوە و تێک ناچێت */
        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.5s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px var(--card-shadow);
            border-color: var(--accent);
        }

        .project-card:hover img { opacity: 0.9; }

        .info {
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .info h3 { margin: 0; font-size: 17px; font-weight: 700; color: #333; }
        .btn-view { font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; }

        /* Action Buttons */
        .actions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            text-align: center;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-behance { background: #000; color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); }
        
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        footer { margin-top: 50px; font-size: 11px; color: #bbb; text-align: center; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg" alt="Sahand Sabir">
            <h1>Sahand Sabir</h1>
            <p class="tagline">Visual Artist • Graphic Designer</p>
        </div>

        <div class="gallery">
            <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="project-card" style="animation-delay: 0.2s;">
                <div class="img-container">
                    <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg" alt="Automotive">
                </div>
                <div class="info">
                    <h3>Automotive Visuals</h3>
                    <span class="btn-view">View ↗</span>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" style="animation-delay: 0.4s;">
                <div class="img-container">
                    <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg" alt="Teammart">
                </div>
                <div class="info">
                    <h3>Teammart Branding</h3>
                    <span class="btn-view">View ↗</span>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" style="animation-delay: 0.6s;">
                <div class="img-container">
                    <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg" alt="Energy Drink">
                </div>
                <div class="info">
                    <h3>Energy Concept</h3>
                    <span class="btn-view">View ↗</span>
                </div>
            </a>
        </div>

        <div class="actions">
            <a href="https://www.behance.net/sahandshusen1" class="btn btn-behance">Behance Portfolio</a>
            <a href="https://wa.me/9647517050214" class="btn btn-whatsapp">Let's Talk on WhatsApp</a>
        </div>

        <footer>DESIGNED BY SAHAND SABIR © 2026</footer>
    </div>

</body>
</html>
