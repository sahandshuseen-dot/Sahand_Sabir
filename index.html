<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir Hussein | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --accent: #007AFF;
            --text: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 15px;
            box-sizing: border-box;
        }

        .profile {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--accent);
            padding: 3px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 { font-size: 30px; margin: 20px 0 5px; font-weight: 800; letter-spacing: -1.5px; }
        .tagline { color: #777; font-size: 16px; font-weight: 500; }

        .section-header {
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ddd;
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::after { content: ""; height: 1px; background: #eee; flex: 1; }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .project-card {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .img-container {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #f0f0f0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .project-card img {
            width: 100%;
            display: block;
            transition: 0.5s;
        }

        .project-card:hover .img-container {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }
