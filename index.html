<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahand Sabir | Portfolio 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --accent:#007aff;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  overflow-x:hidden;

  /* 🔥 animated background */
  background: linear-gradient(-45deg, #f8fbff, #eef6ff, #fdfbff, #edf7ff, #f6faff);
  background-size:400% 400%;
  animation:gradientShift 14s ease infinite;
}

/* gradient animation */
@keyframes gradientShift{
  0%{background-position:0% 50%;}
  25%{background-position:50% 100%;}
  50%{background-position:100% 50%;}
  75%{background-position:50% 0%;}
  100%{background-position:0% 50%;}
}

/* blobs */
.bg-animation{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(40px);
  opacity:0.35;
  animation:float 18s ease-in-out infinite alternate;
}

.blob:nth-child(1){
  width:240px;height:240px;
  top:10%;left:8%;
  background:rgba(0,122,255,0.2);
}

.blob:nth-child(2){
  width:200px;height:200px;
  top:50%;right:10%;
  background:rgba(90,200,250,0.2);
}

.blob:nth-child(3){
  width:260px;height:260px;
  bottom:5%;left:30%;
  background:rgba(125,90,255,0.15);
}

@keyframes float{
  from{transform:translateY(0) translateX(0);}
  to{transform:translateY(-30px) translateX(20px);}
}

/* container */
.container{
  width:min(100%,760px);
  margin:auto;
  padding:60px 20px;
}

/* profile */
.profile{
  text-align:center;
  margin-bottom:40px;
}

.profile img{
  width:135px;
  height:135px;
  object-fit:cover;
  border-radius:50%;
  border:5px solid #fff;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
  transition:.4s;
}

.profile img:hover{
  transform:scale(1.05);
}

h1{
  margin:15px 0 5px;
  font-size:34px;
  font-weight:900;
}

.tagline{
  color:var(--muted);
}

/* gallery */
.gallery{
  display:flex;
  flex-direction:column;
  gap:25px;
}

.project-card{
  display:block;
  border-radius:25px;
  overflow:hidden;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.5);
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:.35s;
  text-decoration:none;
  color:inherit;
}

.project-card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 45px rgba(0,122,255,0.12);
}

/* IMPORTANT: no crop */
.img-box img{
  width:100%;
  height:auto;
  display:block;
}

/* info */
.project-info{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
}

.project-info h3{
  margin:0;
  font-size:18px;
}

.arrow{
  color:var(--accent);
  font-weight:900;
  transition:.3s;
}

.project-card:hover .arrow{
  transform:translateX(6px);
}

/* links */
.links{
  margin-top:35px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.btn{
  padding:18px;
  border-radius:22px;
  text-align:center;
  font-weight:800;
  text-decoration:none;
  transition:.25s;
}

.btn:hover{
  transform:translateY(-3px);
}

.behance{
  background:#000;
  color:#fff;
}

.whatsapp{
  background:#25D366;
  color:#fff;
}

/* footer */
footer{
  margin-top:50px;
  text-align:center;
  font-size:11px;
  color:#aaa;
  letter-spacing:2px;
}
</style>
</head>

<body>

<div class="bg-animation">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<div class="container">

  <div class="profile">
    <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg">
    <h1>Sahand Sabir</h1>
    <p class="tagline">Graphic Designer • Visual Artist</p>
  </div>

  <div class="gallery">

    <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="project-card" target="_blank">
      <div class="img-box">
        <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg">
      </div>
      <div class="project-info">
        <h3>Automotive Visuals</h3>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" target="_blank">
      <div class="img-box">
        <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg">
      </div>
      <div class="project-info">
        <h3>Teammart Branding</h3>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" target="_blank">
      <div class="img-box">
        <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg">
      </div>
      <div class="project-info">
        <h3>Energy Drink Concept</h3>
        <span class="arrow">→</span>
      </div>
    </a>

  </div>

  <div class="links">
    <a href="https://www.behance.net/sahandshusen1" class="btn behance">Behance Portfolio</a>
    <a href="https://wa.me/9647517050214" class="btn whatsapp">WhatsApp Contact</a>
  </div>

  <footer>© 2026 SAHAND SABIR</footer>

</div>

</body>
</html>
