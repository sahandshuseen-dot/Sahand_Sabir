<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir Hussein | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f9f9f9;
            --accent: #007AFF;
            --text: #111111;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Profile Section */
        .profile img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { font-size: 26px; margin: 20px 0 5px; letter-spacing: -0.5px; }
        .tagline { color: #666; font-size: 16px; margin-bottom: 35px; }

        /* Portfolio Gallery */
        .section-header {
            text-align: left;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #999;
            margin: 30px 0 15px;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .project-card {
            background: var(--secondary-bg);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #eee;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .project-card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .project-info {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-info span { font-weight: 600; font-size: 15px; }
        .project-info small { color: var(--accent); font-weight: 700; }

        /* Links Section */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-behance { background: #0057ff; color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; }
        .btn:hover { opacity: 0.85; transform: scale(1.01); }

        footer { margin-top: 50px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg" alt="Sahand Sabir Hussein">
            <h1>Sahand Sabir Hussein</h1>
            <p class="tagline">Graphic Designer | Social Media Expert</p>
        </div>

        <div class="section-header">Recent Works</div>
        
        <div class="gallery">
            <a href="https://www.behance.net/gallery/230238317/SUN-SET" class="project-card" target="_blank">
                <img src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/961168230238317.685934f8e5f22.jpg" alt="Sun Set">
                <div class="project-info">
                    <span>Sun Set Branding</span>
                    <small>View Project ↗</small>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" target="_blank">
                <img src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/8d85f8232752781.6888257007786.jpg" alt="Teammart">
                <div class="project-info">
                    <span>Teammart Market</span>
                    <small>View Project ↗</small>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" target="_blank">
                <img src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/3e5f2e204856845.66ad265146c82.jpg" alt="Energy Drink">
                <div class="project-info">
                    <span>Energy Drink Design</span>
                    <small>View Project ↗</small>
                </div>
            </a>
        </div>

        <div class="section-header">Contact & Bio</div>
        <div class="links">
            <a href="https://www.behance.net/sahandshusen1" class="btn btn-behance">Behance Portfolio</a>
            <a href="https://wa.me/9647500000000" class="btn btn-whatsapp">WhatsApp Me</a>
        </div>

        <footer>&copy; 2026 Sahand Sabir Hussein</footer>
    </div>

</body>
</html>
