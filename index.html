<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahand Sabir Huseen | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #0a84ff;
      --text: #0f172a;
      --muted: #667085;
      --glass: rgba(255, 255, 255, 0.56);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --stroke: rgba(255, 255, 255, 0.62);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-hover: 0 18px 42px rgba(15, 23, 42, 0.10);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(10,132,255,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(90,200,250,.08), transparent 26%),
        linear-gradient(135deg, #f9fbff 0%, #f3f7ff 35%, #fbfcff 65%, #f3f8ff 100%);
      background-size: 120% 120%, 120% 120%, 200% 200%;
      animation: bgShift 20s ease-in-out infinite;
    }

    @keyframes bgShift {
      0% { background-position: 0% 0%, 100% 100%, 0% 50%; }
      50% { background-position: 6% 4%, 94% 96%, 100% 50%; }
      100% { background-position: 0% 0%, 100% 100%, 0% 50%; }
    }

    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .18;
      animation: calmFloat 24s ease-in-out infinite alternate;
    }

    .blob:nth-child(1) { width: 300px; height: 300px; top: -40px; left: 4%; background: rgba(10,132,255,.40); }
    .blob:nth-child(2) { width: 250px; height: 250px; right: 2%; top: 42%; background: rgba(90,200,250,.32); }

    @keyframes calmFloat {
      0% { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(20px,-28px,0) scale(1.06); }
    }

    .container {
      width: min(100%, 700px); /* بچووککردنەوەی پانی گشتی */
      margin: 0 auto;
      padding: 60px 20px;
    }

    .profile {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      border-radius: 32px;
      background: var(--glass);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .profile img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    h1 { margin: 15px 0 5px; font-size: 30px; font-weight: 900; letter-spacing: -1px; }
    .tagline { color: var(--muted); font-size: 14px; font-weight: 500; }

    /* کارتەکان لێرە بچووک کراونەتەوە */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .project-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--stroke);
      transition: all .3s ease;
      text-decoration: none;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .img-box img {
      width: 100%;
      height: 200px; /* دیاریکردنی بەرزی بۆ بچووککردنەوە */
      object-fit: cover;
      display: block;
    }

    .project-info {
      padding: 12px 16px;
      display: flex;
      justify-content: flex-end;
      background: rgba(255,255,255,0.8);
    }

    .arrow-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      display: grid;
      place-items: center;
    }

    .links { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }

    .btn {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: white;
      border: 1px solid var(--stroke);
      font-weight: 700;
      transition: all .2s ease;
    }

    .btn:hover { background: #f8faff; transform: translateX(5px); }

    .btn-icon {
      width: 30px;
      height: 30px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer { margin-top: 40px; text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    @media (max-width: 500px) {
      .gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

    <div class="gallery">

    <div class="links">

          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#15a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 9 6.9Z"></path></svg>
        </div>

    </div>

    <footer>© 2026 SAHAND SABIR HUSEEN</footer>
  </div>

</body>
</html>
