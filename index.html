<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahand Sabir | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --accent:#007aff;
  --glass:rgba(255,255,255,0.6);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#f8fbff,#eef6ff);
  color:#111;
}

/* background */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
  radial-gradient(circle at 20% 20%, rgba(0,122,255,0.15), transparent 30%),
  radial-gradient(circle at 80% 70%, rgba(90,200,250,0.15), transparent 30%);
}

/* container */
.container{
  width:min(1100px,90%);
  margin:auto;
  padding:60px 0;
}

/* title */
.title{
  text-align:center;
  margin-bottom:40px;
}

.title h1{
  font-size:42px;
  margin:0;
  font-weight:900;
}

/* gallery */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:28px;
}

/* card */
.card{
  border-radius:26px;
  overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.4);
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 50px rgba(0,122,255,0.15);
}

/* IMPORTANT PART */
.img-box img{
  width:100%;
  height:auto; /* 👈 ئەمە گرنگە بۆ crop نەکردن */
  display:block;
}

/* info */
.info{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info h3{
  margin:0;
  font-size:18px;
}

.arrow{
  color:var(--accent);
  font-weight:900;
}

/* links */
.links{
  margin-top:40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.btn{
  padding:18px;
  text-align:center;
  border-radius:20px;
  font-weight:800;
  text-decoration:none;
}

.behance{background:#000;color:#fff;}
.whatsapp{background:#25D366;color:#fff;}

footer{
  text-align:center;
  margin-top:40px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="title">
    <h1>Sahand Sabir</h1>
  </div>

  <div class="gallery">

    <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="card" target="_blank">
      <div class="img-box">
        <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg">
      </div>
      <div class="info">
        <h3>Automotive Visuals</h3>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="card" target="_blank">
      <div class="img-box">
        <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg">
      </div>
      <div class="info">
        <h3>Teammart Branding</h3>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="card" target="_blank">
      <div class="img-box">
        <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg">
      </div>
      <div class="info">
        <h3>Energy Drink Concept</h3>
        <span class="arrow">→</span>
      </div>
    </a>

  </div>

  <div class="links">
    <a href="https://www.behance.net/sahandshusen1" class="btn behance">Behance</a>
    <a href="https://wa.me/9647517050214" class="btn whatsapp">WhatsApp</a>
  </div>

  <footer>© 2026 SAHAND</footer>

</div>

</body>
</html>
