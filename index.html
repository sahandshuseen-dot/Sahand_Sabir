<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic Designer | Bio Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0a;
            --accent: #007AFF; 
            --bg: #ffffff;
            --card-bg: #f5f5f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary);
        }

        .profile {
            text-align: center;
            margin-top: 30px;
        }

        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; margin: 15px 0 5px; letter-spacing: -0.5px; }
        .bio { color: #666; font-size: 15px; margin-bottom: 30px; }

        .section-title {
            width: 100%;
            max-width: 400px;
            font-weight: 700;
            margin: 25px 0 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        /* Portfolio Cards */
        .portfolio-grid {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .work-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: var(--primary);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #eee;
        }

        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .work-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .work-info span { font-weight: 600; font-size: 15px; }

        /* Social Links */
        .links {
            width: 100%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .social-btn {
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .social-btn:hover { opacity: 0.8; }
        .whatsapp { background: #25D366; }

        footer { margin-top: 50px; font-size: 12px; color: #bbb; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="profile">
        <img src="profile.jpg" alt="Designer Profile">
        <h1>Your Name</h1>
        <p class="bio">Social Media Design Specialist</p>
    </div>

    <div class="section-title">Latest Works</div>
    <div class="portfolio-grid">
        <a href="https://www.behance.net/gallery/230238317/SUN-SET" class="work-card" target="_blank">
            <div class="work-info">
                <span>🌅 Sun Set Project</span>
                <small>Behance ↗</small>
            </div>
        </a>

        <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="work-card" target="_blank">
            <div class="work-info">
                <span>🛒 Teammart Market</span>
                <small>Behance ↗</small>
            </div>
        </a>

        <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="work-card" target="_blank">
            <div class="work-info">
                <span>⚡ Energy Drink Ad</span>
                <small>Behance ↗</small>
            </div>
        </a>
    </div>

    <div class="section-title">Connect With Me</div>
    <div class="links">
        <a href="https://instagram.com/yourusername" class="social-btn">Instagram</a>
        <a href="https://wa.me/964000000000" class="social-btn whatsapp">WhatsApp</a>
    </div>

    <footer>&copy; 2026 | Professional Design Services</footer>

</body>
</html>
