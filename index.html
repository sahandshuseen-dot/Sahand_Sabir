<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir | Interactive Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #007AFF;
            --text: #ffffff;
        }

        /* باگراوندێکی ڕەش و شینی قووڵ لەگەڵ جووڵەی ڕووناکی */
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* دروستکردنی جووڵەی ڕووناکی لە پشتەوە */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #003366 0%, #050505 70%);
            z-index: -1;
            animation: pulseBg 8s ease-in-out infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0.5; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* جووڵەی پڕۆفایل کاتێک لاپەڕەکە دەبێتەوە */
        .profile {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            transition: 0.5s ease;
            filter: drop-shadow(0 0 15px rgba(0, 122, 255, 0.5));
        }

        .profile img:hover {
            transform: rotate(10deg) scale(1.1);
            filter: drop-shadow(0 0 25px rgba(0, 122, 255, 0.8));
        }

        h1 { font-size: 32px; font-weight: 900; margin: 15px 0 5px; letter-spacing: -1.5px; }
        .tagline { color: #888; font-size: 16px; font-weight: 400; }

        /* جووڵەی کارتەکان یەک لە دوای یەک */
        .project-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            margin-bottom: 30px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(100px);
            opacity: 0;
            animation: slideIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* کاتی جیاواز بۆ دەرکەوتنی هەر کارتێک */
        .project-card:nth-child(2) { animation-delay: 0.2s; }
        .project-card:nth-child(3) { animation-delay: 0.4s; }
        .project-card:nth-child(4) { animation-delay: 0.6s; }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .project-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-10px) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .img-box { width: 100%; height: 250px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .project-card:hover .img-box img { transform: scale(1.15); }

        .info { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .info h3 { margin: 0; font-size: 18px; }
        .badge { background: var(--accent); padding: 6px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; }

        /* دوگمەی وەتسئەپی جووڵاو */
        .whatsapp-float {
            background: #25D366;
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        footer { margin-top: 50px; font-size: 10px; color: #444; text-align: center; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg" alt="Sahand Sabir">
            <h1>Sahand Sabir</h1>
            <p class="tagline">Visual Artist • Graphic Designer</p>
        </div>

        <div class="gallery">
            <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="project-card" target="_blank">
                <div class="img-box">
                    <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg" alt="Automotive">
                </div>
                <div class="info">
                    <h3>Automotive Visuals</h3>
                    <div class="badge">View Case</div>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" target="_blank">
                <div class="img-box">
                    <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg" alt="Teammart">
                </div>
                <div class="info">
                    <h3>Teammart Branding</h3>
                    <div class="badge">View Case</div>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" target="_blank">
                <div class="img-box">
                    <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg" alt="Energy Drink">
                </div>
                <div class="info">
                    <h3>Energy Concept</h3>
                    <div class="badge">View Case</div>
                </div>
            </a>
        </div>

        <a href="https://wa.me/9647517050214" class="whatsapp-float">
            MESSAGE ME ON WHATSAPP
        </a>

        <footer>SAHAND SABIR HUSSEIN 2026</footer>
    </div>

</body>
</html>
