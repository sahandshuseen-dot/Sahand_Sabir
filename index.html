<style>
:root{
  --accent:#0a84ff;
  --text:#111;
  --glass:rgba(255,255,255,0.45);
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

/* 🔥 ULTRA BACKGROUND */
body{
  background:
    linear-gradient(120deg,#eaf4ff,#fdfbff,#f3faff,#eef8ff),
    linear-gradient(240deg,#dfefff,#fcefff,#eaf4ff);
  background-size: 300% 300%, 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%,100% 50%;}
  25%{background-position:50% 100%,50% 0%;}
  50%{background-position:100% 50%,0% 50%;}
  75%{background-position:50% 0%,50% 100%;}
  100%{background-position:0% 50%,100% 50%;}
}

/* BLOBS */
.bg-animation{
  position:fixed;
  inset:0;
  z-index:-1;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(60px);
  opacity:0.4;
  animation:blobMove 18s infinite alternate ease-in-out;
}

.blob:nth-child(1){
  width:320px;height:320px;
  top:0%;left:5%;
  background:#0a84ff55;
}
.blob:nth-child(2){
  width:260px;height:260px;
  top:50%;right:10%;
  background:#5ac8fa55;
  animation-duration:22s;
}
.blob:nth-child(3){
  width:280px;height:280px;
  bottom:0%;left:30%;
  background:#a259ff44;
  animation-duration:20s;
}
.blob:nth-child(4){
  width:220px;height:220px;
  top:30%;left:60%;
  background:#ff7ad944;
  animation-duration:24s;
}

/* smooth random movement */
@keyframes blobMove{
  0%{transform:translate(0,0) scale(1);}
  25%{transform:translate(40px,-30px) scale(1.1);}
  50%{transform:translate(-30px,30px) scale(1.05);}
  75%{transform:translate(20px,40px) scale(1.12);}
  100%{transform:translate(-40px,-20px) scale(1.08);}
}

/* LIGHT PULSE */
.bg-animation::after{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.5), transparent 60%);
  opacity:0.2;
  animation:pulse 10s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:0.15;}
  50%{transform:scale(1.2);opacity:0.3;}
  100%{transform:scale(1);opacity:0.15;}
}

/* GLASS UI */
.container{
  width:min(100%,760px);
  margin:auto;
  padding:60px 20px;
}

.profile{
  text-align:center;
  margin-bottom:40px;
  padding:25px;
  border-radius:30px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.5);
}

.profile img{
  width:130px;height:130px;
  border-radius:50%;
  border:4px solid #fff;
  transition:.4s;
}
.profile img:hover{
  transform:scale(1.05);
}

h1{margin:15px 0 5px;font-size:34px;font-weight:900;}
.tagline{color:#666;}

.gallery{
  display:flex;
  flex-direction:column;
  gap:25px;
}

.project-card{
  border-radius:25px;
  overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.5);
  transition:.35s;
  text-decoration:none;
  color:inherit;
}

.project-card:hover{
  transform:translateY(-8px);
}

.img-box img{
  width:100%;
  height:auto;
}

.project-info{
  padding:20px;
  display:flex;
  justify-content:space-between;
  background:#ffffffcc;
}

.arrow{
  color:var(--accent);
  font-weight:900;
}

.links{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  padding:18px;
  border-radius:20px;
  text-align:center;
  font-weight:800;
  background:var(--glass);
  backdrop-filter:blur(15px);
}

footer{
  text-align:center;
  margin-top:40px;
  font-size:11px;
  color:#888;
}
</style>
</head>
