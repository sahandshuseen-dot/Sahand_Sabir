<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahand Sabir Huseen | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #0a84ff;
      --text: #0f172a;
      --muted: #667085;
      --glass: rgba(255, 255, 255, 0.56);
      --stroke: rgba(255, 255, 255, 0.62);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(10,132,255,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(90,200,250,.08), transparent 26%),
        linear-gradient(135deg, #f9fbff 0%, #f3f7ff 35%, #fbfcff 65%, #f3f8ff 100%);
      background-size: 120% 120%;
    }

    .container {
      width: min(100%, 700px); /* پاناییەکەی کەمێک کەم کراوەتەوە بۆ جوانی */
      margin: 0 auto;
      padding: 50px 20px;
    }

    .profile {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      border-radius: 32px;
      background: var(--glass);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    h1 { margin: 15px 0 5px; font-size: 32px; font-weight: 900; letter-spacing: -1px; }
    .tagline { color: var(--muted); font-size: 15px; font-weight: 500; }

    /* کارتەکان لە دوای یەکتر ڕیز دەبن */
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .project-card {
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--stroke);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: block;
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      background: white;
    }

    .img-box img {
      width: 100%;
      height: auto; /* وێنەکە چەندە بێت هەر وای نیشان دەدات */
      display: block;
    }

    .project-info {
      padding: 16px 20px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      background: rgba(255, 255, 255, 0.5);
    }

    .arrow-icon {
      width: 42px;
      height: 42px;
      background: var(--accent);
      color: white;
      border-radius: 14px;
      display: grid;
      place-items: center;
      transition: transform 0.2s ease;
    }

    .project-card:hover .arrow-icon {
      transform: scale(1.1) rotate(-8deg);
    }

    .links { margin-top: 35px; display: flex; flex-direction: column; gap: 12px; }

    .btn {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      border-radius: 20px;
      text-decoration: none;
      color: var(--text);
      background: white;
      border: 1px solid var(--stroke);
      font-weight: 800;
      font-size: 16px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }

    .btn:hover {
      background: #f8faff;
      transform: translateX(6px);
      border-color: #0a84ff;
    }

    .btn-icon { margin-right: 14px; display: flex; align-items: center; }

    footer { margin-top: 50px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  </style>
</head>
<body>

  <div class="container">
    <div class="profile">
      <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg" alt="Sahand Sabir Huseen" />
      <h1>Sahand Sabir Huseen</h1>
      <p class="tagline">Graphic Designer • Visual Artist</p>
    </div>

    <div class="gallery">
      <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="project-card" target="_blank">
        <div class="img-box">
          <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg" alt="Automotive Visuals" />
        </div>
        <div class="project-info">
          <div class="arrow-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
          </div>
        </div>
      </a>

      <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" target="_blank">
        <div class="img-box">
          <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg" alt="Teammart Branding" />
        </div>
        <div class="project-info">
          <div class="arrow-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
          </div>
        </div>
      </a>

      <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" target="_blank">
        <div class="img-box">
          <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg" alt="Energy Drink Concept" />
        </div>
        <div class="project-info">
          <div class="arrow-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
          </div>
        </div>
      </a>
    </div>

    <div class="links">
      <a href="https://www.behance.net/sahandshusen1" class="btn" target="_blank">
        <div class="btn-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M8 12h8"></path><path d="M12 8l4 4-4 4"></path></svg>
        </div>
        <span>Behance Portfolio</span>
      </a>

      <a href="https://wa.me/9647517050214" class="btn" target="_blank">
        <div class="btn-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#15a34a" stroke-width="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 9 6.9Z"></path></svg>
        </div>
        <span>WhatsApp Contact</span>
      </a>
    </div>

    <footer>© 2026 SAHAND SABIR HUSEEN</footer>
  </div>

</body>
</html>
