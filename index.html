<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahand Sabir Huseen | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --accent:#0a84ff;
      --text:#0f172a;
      --muted:#667085;
      --glass:rgba(255,255,255,0.56);
      --glass-strong:rgba(255,255,255,0.76);
      --stroke:rgba(255,255,255,0.62);
      --shadow:0 10px 30px rgba(15,23,42,0.06);
      --shadow-hover:0 18px 42px rgba(15,23,42,0.10);
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      color:var(--text);
      overflow-x:hidden;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(10,132,255,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(90,200,250,.08), transparent 26%),
        linear-gradient(135deg, #f9fbff 0%, #f3f7ff 35%, #fbfcff 65%, #f3f8ff 100%);
      background-size:120% 120%, 120% 120%, 200% 200%;
      animation:bgShift 20s ease-in-out infinite;
    }

    @keyframes bgShift{
      0%{
        background-position:0% 0%, 100% 100%, 0% 50%;
      }
      50%{
        background-position:6% 4%, 94% 96%, 100% 50%;
      }
      100%{
        background-position:0% 0%, 100% 100%, 0% 50%;
      }
    }

    .bg-animation{
      position:fixed;
      inset:0;
      z-index:-1;
      overflow:hidden;
      pointer-events:none;
    }

    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:.18;
      animation:calmFloat 24s ease-in-out infinite alternate;
      will-change:transform;
    }

    .blob:nth-child(1){
      width:320px;
      height:320px;
      top:-40px;
      left:4%;
      background:rgba(10,132,255,.40);
    }

    .blob:nth-child(2){
      width:280px;
      height:280px;
      right:2%;
      top:42%;
      background:rgba(90,200,250,.32);
      animation-duration:28s;
    }

    .blob:nth-child(3){
      width:340px;
      height:340px;
      left:28%;
      bottom:-90px;
      background:rgba(162,89,255,.18);
      animation-duration:26s;
    }

    @keyframes calmFloat{
      0%{
        transform:translate3d(0,0,0) scale(1);
      }
      100%{
        transform:translate3d(20px,-28px,0) scale(1.06);
      }
    }

    .container{
      width:min(100%, 860px);
      margin:0 auto;
      padding:64px 20px 48px;
    }

    .profile{
      position:relative;
      text-align:center;
      margin-bottom:34px;
      padding:34px 24px 28px;
      border-radius:36px;
      background:var(--glass);
      border:1px solid var(--stroke);
      backdrop-filter:blur(22px) saturate(165%);
      -webkit-backdrop-filter:blur(22px) saturate(165%);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .profile::before,
    .btn::before,
    .section-icon::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,.08));
      pointer-events:none;
    }

    .profile img{
      position:relative;
      width:138px;
      height:138px;
      object-fit:cover;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.84);
      box-shadow:
        0 14px 28px rgba(15,23,42,.09),
        inset 0 1px 0 rgba(255,255,255,.55);
      transition:transform .35s ease, box-shadow .35s ease;
    }

    .profile img:hover{
      transform:scale(1.03);
      box-shadow:
        0 18px 34px rgba(15,23,42,.12),
        inset 0 1px 0 rgba(255,255,255,.55);
    }

    h1{
      position:relative;
      margin:18px 0 8px;
      font-size:36px;
      line-height:1;
      font-weight:900;
      letter-spacing:-1.6px;
    }

    .tagline{
      position:relative;
      margin:0;
      color:var(--muted);
      font-size:15px;
      font-weight:500;
    }

    .gallery{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .project-card{
      position:relative;
      display:block;
      overflow:hidden;
      border-radius:32px;
      text-decoration:none;
      color:inherit;
      background:rgba(255,255,255,.50);
      border:1px solid rgba(255,255,255,.62);
      backdrop-filter:blur(20px) saturate(160%);
      -webkit-backdrop-filter:blur(20px) saturate(160%);
      box-shadow:var(--shadow);
      transition:
        transform .35s ease,
        box-shadow .35s ease,
        border-color .35s ease;
    }

    .project-card:hover{
      transform:translateY(-5px);
      box-shadow:var(--shadow-hover);
      border-color:rgba(255,255,255,.82);
    }

    /* گرنگ: هیچ overlay لەسەر وێنەکە نەبێت */
    .img-box{
      width:100%;
      overflow:hidden;
      background:transparent;
    }

    .img-box img{
      width:100%;
      height:auto;
      display:block;
      transition:transform .55s ease;
      filter:none;
      opacity:1;
      mix-blend-mode:normal;
    }

    .project-card:hover .img-box img{
      transform:scale(1.012);
    }

    .project-info{
      position:relative;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:16px 18px;
      background:rgba(255,255,255,.30);
      border-top:1px solid rgba(255,255,255,.42);
    }

    .arrow{
      width:46px;
      height:46px;
      display:grid;
      place-items:center;
      flex-shrink:0;
      border-radius:16px;
      color:var(--accent);
      background:var(--glass-strong);
      border:1px solid rgba(255,255,255,.74);
      box-shadow:
        0 8px 18px rgba(15,23,42,.05),
        inset 0 1px 0 rgba(255,255,255,.55);
      transition:transform .28s ease, background .28s ease, box-shadow .28s ease;
    }

    .project-card:hover .arrow{
      transform:translateX(4px);
      background:rgba(255,255,255,.92);
      box-shadow:
        0 12px 24px rgba(15,23,42,.08),
        inset 0 1px 0 rgba(255,255,255,.55);
    }

    .links{
      margin-top:22px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .btn{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
      text-decoration:none;
      padding:18px 18px;
      border-radius:24px;
      font-size:16px;
      font-weight:800;
      color:var(--text);
      background:rgba(255,255,255,.50);
      border:1px solid rgba(255,255,255,.66);
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:var(--shadow-hover);
      border-color:rgba(255,255,255,.82);
    }

    .btn span{
      position:relative;
      z-index:1;
    }

    .btn-icon{
      position:relative;
      z-index:1;
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:12px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(255,255,255,.8);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.52);
      flex-shrink:0;
    }

    .icon-svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .accent{
      color:var(--accent);
    }

    .green{
      color:#15a34a;
    }

    footer{
      margin-top:36px;
      text-align:center;
      font-size:11px;
      letter-spacing:2px;
      color:rgba(15,23,42,.42);
    }

    @media (max-width: 640px){
      .container{
        padding-top:42px;
      }

      .profile{
        border-radius:30px;
        padding:28px 18px 24px;
      }

      .project-card{
        border-radius:26px;
      }

      h1{
        font-size:31px;
      }

      .arrow{
        width:42px;
        height:42px;
        border-radius:14px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *{
        animation:none !important;
        transition:none !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>
