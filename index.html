        :root {

        .profile {

            margin-bottom: 50px;
        }

        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;

            border: 5px solid var(--accent);

            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .section-header {

            color: #ddd;

            display: flex;
            align-items: center;
            gap: 10px;
        }

            gap: 30px;
        }
