<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahand Sabir | Portfolio 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #007AFF;
      --accent-soft: rgba(0, 122, 255, 0.10);
      --text: #111111;
      --muted: #7b7b7b;
      --card: rgba(255, 255, 255, 0.72);
      --border: rgba(255, 255, 255, 0.65);
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.05);
      --shadow-hover: 0 20px 50px rgba(0, 122, 255, 0.14);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(0,122,255,0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(90,200,250,0.10), transparent 28%),
        linear-gradient(to bottom, #ffffff, #f6faff);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0.6;
      animation: floatBlob 14s ease-in-out infinite alternate;
    }

    .blob.one {
      width: 220px;
      height: 220px;
      top: 4%;
      left: 5%;
      background: rgba(0, 122, 255, 0.10);
    }

    .blob.two {
      width: 180px;
      height: 180px;
      top: 40%;
      right: 8%;
      background: rgba(90, 200, 250, 0.12);
      animation-duration: 18s;
    }

    .blob.three {
      width: 240px;
      height: 240px;
      bottom: 5%;
      left: 20%;
      background: rgba(0, 122, 255, 0.07);
      animation-duration: 20s;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(0, 122, 255, 0.06);
      animation: moveUp linear infinite;
    }

    @keyframes floatBlob {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(25px, -30px) scale(1.12);
      }
    }

    @keyframes moveUp {
      from {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      to {
        transform: translateY(-15vh) rotate(360deg);
        opacity: 0.85;
      }
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 60px 20px;
      position: relative;
    }

    /* Profile */
    .profile {
      text-align: center;
      margin-bottom: 46px;
    }

    .profile img {
      width: 136px;
      height: 136px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid rgba(255,255,255,0.95);
      box-shadow:
        0 14px 35px rgba(0,0,0,0.10),
        0 0 0 10px rgba(255,255,255,0.35);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .profile img:hover {
      transform: scale(1.04);
      box-shadow:
        0 18px 45px rgba(0,0,0,0.13),
        0 0 0 10px rgba(255,255,255,0.45);
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      margin: 18px 0 6px;
      letter-spacing: -1.4px;
    }

    .tagline {
      color: var(--muted);
      font-size: 16px;
      margin: 0;
    }

    /* Gallery */
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .project-card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 0.35s cubic-bezier(0.2, 1, 0.3, 1),
                  box-shadow 0.35s ease,
                  border-color 0.35s ease;
    }

    .project-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0, 122, 255, 0.22);
    }

    .img-box {
      width: 100%;
      background: #f3f6fb;
    }

    .img-box img {
      width: 100%;
      height: auto; /* crop ناکات */
      display: block;
    }

    .project-info {
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.82);
    }

    .project-info h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .arrow {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
      flex-shrink: 0;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .project-card:hover .arrow {
      transform: translateX(4px);
      background: rgba(0, 122, 255, 0.14);
    }

    /* Links */
    .links {
      margin-top: 34px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: block;
      padding: 18px 20px;
      border-radius: var(--radius-lg);
      text-align: center;
      font-weight: 800;
      font-size: 16px;
      transition: transform 0.25s ease, opacity 0.25s ease, box-shadow 0.25s ease;
      box-shadow: var(--shadow);
    }

    .btn:hover {
      transform: translateY(-3px);
      opacity: 0.97;
    }

    .btn-behance {
      background: #000;
      color: #fff;
    }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 211, 102, 0.18);
    }

    footer {
      margin-top: 48px;
      font-size: 11px;
      color: #c2c7d0;
      text-align: center;
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 42px 16px;
      }

      .profile {
        margin-bottom: 38px;
      }

      .profile img {
        width: 122px;
        height: 122px;
      }

      h1 {
        font-size: 28px;
      }

      .project-info {
        padding: 16px 18px;
      }

      .btn {
        padding: 17px 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>

  <div class="bg-animation">
    <div class="blob one"></div>
    <div class="blob two"></div>
    <div class="blob three"></div>

    <div class="circle" style="width:80px; height:80px; left:10%; animation-duration:15s;"></div>
    <div class="circle" style="width:40px; height:40px; left:30%; animation-duration:10s; animation-delay:2s;"></div>
    <div class="circle" style="width:120px; height:120px; left:70%; animation-duration:18s; animation-delay:4s;"></div>
    <div class="circle" style="width:60px; height:60px; left:85%; animation-duration:12s; animation-delay:1s;"></div>
    <div class="circle" style="width:30px; height:30px; left:50%; animation-duration:8s; animation-delay:5s;"></div>
  </div>

  <div class="container">
    <div class="profile">
      <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg" alt="Sahand Sabir">
      <h1>Sahand Sabir</h1>
      <p class="tagline">Graphic Designer • Visual Artist</p>
    </div>

    <div class="gallery">
      <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="project-card" target="_blank" rel="noopener noreferrer">
        <div class="img-box">
          <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg" alt="Automotive Visuals">
        </div>
        <div class="project-info">
          <h3>Automotive Visuals</h3>
          <span class="arrow">→</span>
        </div>
      </a>

      <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card" target="_blank" rel="noopener noreferrer">
        <div class="img-box">
          <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg" alt="Teammart Branding">
        </div>
        <div class="project-info">
          <h3>Teammart Branding</h3>
          <span class="arrow">→</span>
        </div>
      </a>

      <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card" target="_blank" rel="noopener noreferrer">
        <div class="img-box">
          <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg" alt="Energy Drink Concept">
        </div>
        <div class="project-info">
          <h3>Energy Drink Concept</h3>
          <span class="arrow">→</span>
        </div>
      </a>
    </div>

    <div class="links">
      <a href="https://www.behance.net/sahandshusen1" class="btn btn-behance" target="_blank" rel="noopener noreferrer">Behance Portfolio</a>
      <a href="https://wa.me/9647517050214" class="btn btn-whatsapp" target="_blank" rel="noopener noreferrer">WhatsApp Contact</a>
    </div>

    <footer>© 2026 SAHAND SABIR HUSSEIN</footer>
  </div>

</body>
</html>
