<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahand Sabir | Portfolio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #007AFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111;
            overflow-x: hidden;
        }

        /* باگراوەندی جووڵاو - تەنۆلکەکان */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #ffffff, #f7faff);
        }

        .circle {
            position: absolute;
            background: rgba(0, 122, 255, 0.07);
            border-radius: 50%;
            animation: move linear infinite;
        }

        @keyframes move {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0.8; }
        }

        .container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            padding: 60px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Profile */
        .profile {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.4s ease;
        }

        .profile img:hover { transform: scale(1.05); }

        h1 { font-size: 30px; font-weight: 900; margin: 15px 0 5px; letter-spacing: -1.5px; }
        .tagline { color: #888; font-size: 16px; }

        /* Gallery - Original Widget Size */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .img-box { width: 100%; }
        .img-box img {
            width: 100%;
            height: auto; /* سایزی ڕاستەقینە دەپارێزێت */
            display: block;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,122,255,0.1);
            border-color: var(--accent);
        }

        .project-info {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .project-info h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .arrow { color: var(--accent); font-weight: 900; }

        /* Links */
        .links {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 20px;
            border-radius: 22px;
            text-decoration: none;
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-behance { background: #000; color: #fff; }
        .btn-whatsapp { 
            background: #25D366; 
            color: #fff; 
            box-shadow: 0 10px 20px rgba(37,211,102,0.2);
        }

        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        footer { margin-top: 60px; font-size: 11px; color: #ccc; text-align: center; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="circle" style="width:80px; height:80px; left:10%; animation-duration:15s;"></div>
        <div class="circle" style="width:40px; height:40px; left:30%; animation-duration:10s; animation-delay:2s;"></div>
        <div class="circle" style="width:120px; height:120px; left:70%; animation-duration:18s; animation-delay:4s;"></div>
        <div class="circle" style="width:60px; height:60px; left:85%; animation-duration:12s; animation-delay:1s;"></div>
        <div class="circle" style="width:30px; height:30px; left:50%; animation-duration:8s; animation-delay:5s;"></div>
    </div>

    <div class="container">
        <div class="profile">
            <img src="https://i.postimg.cc/76vvPhQg/freepik-edit-Blue-photoprompt-Ultraphotorealistic-cinematic-edit-(3).jpg" alt="Sahand Sabir">
            <h1>Sahand Sabir</h1>
            <p class="tagline">Graphic Designer • Visual Artist</p>
        </div>

        <div class="gallery">
            <a href="https://www.behance.net/gallery/235073637/Automotive-Visuals" class="project-card">
                <div class="img-box">
                    <img src="https://i.postimg.cc/zvzJCpYr/dffcab77f71a44775c91293605e2e680.jpg" alt="Automotive">
                </div>
                <div class="project-info">
                    <h3>Automotive Visuals</h3>
                    <span class="arrow">→</span>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/232752781/Teammart-Market" class="project-card">
                <div class="img-box">
                    <img src="https://i.postimg.cc/zBRWmzyJ/b33f935468a3e8b3f84b6260aa0a84b8.jpg" alt="Teammart">
                </div>
                <div class="project-info">
                    <h3>Teammart Branding</h3>
                    <span class="arrow">→</span>
                </div>
            </a>

            <a href="https://www.behance.net/gallery/204856845/Social-Media-Energy-Drink" class="project-card">
                <div class="img-box">
                    <img src="https://i.postimg.cc/VkYVzTBq/f6288eb2384348f1df1c40f5dd1839f6.jpg" alt="Energy Drink">
                </div>
                <div class="project-info">
                    <h3>Energy Drink Concept</h3>
                    <span class="arrow">→</span>
                </div>
            </a>
        </div>

        <div class="links">
            <a href="https://www.behance.net/sahandshusen1" class="btn btn-behance">Behance Portfolio</a>
            <a href="https://wa.me/9647517050214" class="btn btn-whatsapp">WhatsApp Contact</a>
        </div>

        <footer>© 2026 SAHAND SABIR HUSSEIN</footer>
    </div>

</body>
</html>
